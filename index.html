<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vanatur Restaurant</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0e0e0e;
  color: #fff;
}

/* HERO */
.hero {
  height: 60vh;
  background: url('https://images.unsplash.com/photo-1555992336-03a23c1c9a1d') center/cover;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.hero h1 {
  font-size: 40px;
  background: rgba(0,0,0,0.6);
  padding: 20px;
}

/* LANG */
.lang {
  text-align: center;
  margin: 10px;
}

.lang button {
  margin: 5px;
  padding: 6px 12px;
  border: 1px solid #555;
  background: none;
  color: #fff;
  cursor: pointer;
}

.lang .active {
  border-color: gold;
  color: gold;
}

/* SECTION */
.section {
  padding: 20px;
  max-width: 1000px;
  margin: auto;
}

/* BEST SELLERS */
.best {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap: 15px;
}

.card {
  background: #1a1a1a;
  border-radius: 10px;
  overflow: hidden;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  height: 140px;
  object-fit: cover;
}

.card .info {
  padding: 10px;
}

.price {
  color: gold;
}

/* TABS */
.tabs {
  display: flex;
  overflow-x: auto;
  border-bottom: 1px solid #333;
}

.tab {
  padding: 10px 15px;
  cursor: pointer;
  color: #aaa;
}

.tab.active {
  color: gold;
  border-bottom: 2px solid gold;
}

/* MENU */
.menu-item {
  display: flex;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px dashed #333;
}

/* CTA */
.cta {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: gold;
  color: black;
  padding: 15px 25px;
  border-radius: 50px;
  text-decoration: none;
  font-weight: bold;
}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1>Vanatur Restaurant</h1>
</div>

<!-- LANGUAGE -->
<div class="lang">
  <button onclick="setLang('hy')" class="active">Հայերեն</button>
  <button onclick="setLang('en')">English</button>
</div>

<!-- BEST SELLERS -->
<div class="section">
  <h2 id="bestTitle">🔥 Լավագույն ուտեստներ</h2>
  <div class="best" id="best"></div>
</div>

<!-- MENU -->
<div class="section">
  <div class="tabs" id="tabs"></div>
  <div id="menu"></div>
</div>

<!-- CTA -->
<a href="tel:041551000" class="cta">📞 041 551000</a>

<script>
let lang = 'hy';

/* DATA */
const data = {
  best: [
    {
      hy:"Քյուֆթա",
      en:"Kyufta",
      price:"7000",
      img:"https://images.unsplash.com/photo-1604908176997-4317c3c8d1a6"
    },
    {
      hy:"Խոզի ռիբս",
      en:"Pork ribs",
      price:"5000",
      img:"https://images.unsplash.com/photo-1600891964599-f61ba0e24092"
    },
    {
      hy:"Կեսար աղցան",
      en:"Caesar salad",
      price:"3600",
      img:"https://images.unsplash.com/photo-1550304943-4f24f54ddde9"
    }
  ],

  menu: {
    appetizers: {
      hy:"Նախուտեստներ",
      en:"Appetizers",
      items:[
        {hy:"Իկրա", en:"Caviar", price:"4500"},
        {hy:"Մսի տեսականի", en:"Meat assortment", price:"4800"},
        {hy:"Թարմ բանջարեղեն", en:"Fresh vegetables", price:"2500"}
      ]
    },

    hot: {
      hy:"Տաք ուտեստներ",
      en:"Hot Dishes",
      items:[
        {hy:"Քյուֆթա", en:"Kyufta", price:"7000"},
        {hy:"Հավի քաբաբ", en:"Chicken kebab", price:"1200"},
        {hy:"Տավարի քաբաբ", en:"Beef kebab", price:"1300"}
      ]
    },

    drinks: {
      hy:"Խմիչքներ",
      en:"Drinks",
      items:[
        {hy:"Ջուր", en:"Water", price:"300"},
        {hy:"Մոխիտո", en:"Mojito", price:"2000"}
      ]
    }
  }
};

/* LANGUAGE */
function setLang(l){
  lang = l;
  document.querySelectorAll('.lang button').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  renderAll();
}

/* RENDER BEST */
function renderBest(){
  const el = document.getElementById('best');
  el.innerHTML='';
  data.best.forEach(item=>{
    el.innerHTML+=`
      <div class="card">
        <img src="${item.img}">
        <div class="info">
          <div>${item[lang]}</div>
          <div class="price">${item.price}</div>
        </div>
      </div>
    `;
  });
}

/* TABS */
function renderTabs(){
  const el=document.getElementById('tabs');
  el.innerHTML='';
  Object.keys(data.menu).forEach((key,i)=>{
    el.innerHTML+=`<div class="tab ${i===0?'active':''}" onclick="openTab('${key}',this)">
      ${data.menu[key][lang]}
    </div>`;
  });
}

/* MENU */
function openTab(key,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');

  const menu=document.getElementById('menu');
  menu.innerHTML='';

  data.menu[key].items.forEach(item=>{
    menu.innerHTML+=`
      <div class="menu-item">
        <span>${item[lang]}</span>
        <span class="price">${item.price}</span>
      </div>
    `;
  });
}

/* INIT */
function renderAll(){
  renderBest();
  renderTabs();
  openTab(Object.keys(data.menu)[0], document.querySelector('.tab'));
}

renderAll();

</script>

</body>
</html>
