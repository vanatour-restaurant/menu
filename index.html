<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vanatur Restaurant</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0e0e0e;
  color: #fff;
}

/* HERO */
.hero {
  height: 60vh;
  background: url('https://images.unsplash.com/photo-1555992336-03a23c1c9a1d') center/cover;
  display: flex;
  align-items: center;
  justify-content: center;
}

.hero h1 {
  background: rgba(0,0,0,0.6);
  padding: 20px;
  font-size: 40px;
}

/* LANGUAGE */
.lang {
  text-align: center;
  margin: 10px;
}

.lang button {
  margin: 5px;
  padding: 6px 12px;
  border: 1px solid #555;
  background: none;
  color: #fff;
  cursor: pointer;
}

.lang .active {
  border-color: gold;
  color: gold;
}

/* SECTION */
.section {
  padding: 20px;
  max-width: 1100px;
  margin: auto;
}

/* CATEGORY TITLE */
.category-title {
  font-size: 24px;
  margin-bottom: 15px;
  color: gold;
}

/* GRID MENU */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
  gap: 15px;
}

/* CARD */
.card {
  background: #1a1a1a;
  border-radius: 10px;
  overflow: hidden;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  height: 160px;
  object-fit: cover;
}

.card .info {
  padding: 10px;
}

.price {
  color: gold;
}

/* CTA */
.cta {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: gold;
  color: black;
  padding: 15px 25px;
  border-radius: 50px;
  text-decoration: none;
  font-weight: bold;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1>Vanatur Restaurant</h1>
</div>

<!-- LANGUAGE -->
<div class="lang">
  <button onclick="setLang('hy')" class="active">Հայերեն</button>
  <button onclick="setLang('en')">English</button>
</div>

<!-- MENU -->
<div id="menu"></div>

<!-- CTA -->
<a href="tel:041551000" class="cta">📞 041 551000</a>

<script>
let lang = 'hy';

const data = {
  appetizers: {
    hy:"Նախուտեստներ",
    en:"Appetizers",
    items:[
      {
        hy:"Իկրա",
        en:"Caviar",
        price:"4500",
        img:"https://images.unsplash.com/photo-1604908176997-4317c3c8d1a6"
      },
      {
        hy:"Մսի տեսականի",
        en:"Meat assortment",
        price:"4800",
        img:"https://images.unsplash.com/photo-1544025162-d76694265947"
      },
      {
        hy:"Թարմ բանջարեղեն",
        en:"Fresh vegetables",
        price:"2500",
        img:"https://images.unsplash.com/photo-1546069901-ba9599a7e63c"
      }
    ]
  },

  salads: {
    hy:"Աղցաններ",
    en:"Salads",
    items:[
      {
        hy:"Կեսար աղցան",
        en:"Caesar salad",
        price:"3600",
        img:"https://images.unsplash.com/photo-1550304943-4f24f54ddde9"
      },
      {
        hy:"Հունական աղցան",
        en:"Greek salad",
        price:"3000",
        img:"https://images.unsplash.com/photo-1569058242253-92a9c755a0ec"
      }
    ]
  },

  hot: {
    hy:"Տաք ուտեստներ",
    en:"Hot Dishes",
    items:[
      {
        hy:"Քյուֆթա",
        en:"Kyufta",
        price:"7000",
        img:"https://images.unsplash.com/photo-1604908176997-4317c3c8d1a6"
      },
      {
        hy:"Խոզի ռիբս",
        en:"Pork ribs",
        price:"5000",
        img:"https://images.unsplash.com/photo-1600891964599-f61ba0e24092"
      },
      {
        hy:"Հավի քաբաբ",
        en:"Chicken kebab",
        price:"1200",
        img:"https://images.unsplash.com/photo-1550547660-d9450f859349"
      }
    ]
  },

  drinks: {
    hy:"Խմիչքներ",
    en:"Drinks",
    items:[
      {
        hy:"Մոխիտո",
        en:"Mojito",
        price:"2000",
        img:"https://images.unsplash.com/photo-1582571352032-448f8b9c4c1b"
      },
      {
        hy:"Կոլա",
        en:"Cola",
        price:"300",
        img:"https://images.unsplash.com/photo-1581093588401-22c38a3a5f04"
      }
    ]
  }
};

/* LANGUAGE SWITCH */
function setLang(l){
  lang = l;
  document.querySelectorAll('.lang button').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  renderMenu();
}

/* RENDER MENU */
function renderMenu(){
  const container = document.getElementById('menu');
  container.innerHTML = '';

  Object.keys(data).forEach(category => {
    const section = document.createElement('div');
    section.className = 'section';

    section.innerHTML = `
      <div class="category-title">${data[category][lang]}</div>
      <div class="grid">
        ${data[category].items.map(item => `
          <div class="card">
            <img src="${item.img}">
            <div class="info">
              <div>${item[lang]}</div>
              <div class="price">${item.price}</div>
            </div>
          </div>
        `).join('')}
      </div>
    `;

    container.appendChild(section);
  });
}

renderMenu();
</script>

</body>
</html>
