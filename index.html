<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vanatur Menu</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: #fff;
}

header {
  text-align: center;
  padding: 30px;
  background: #000;
}

h1 {
  margin: 0;
  color: #f5c518;
}

/* LANGUAGE SWITCH */
.lang-switch {
  margin-top: 10px;
}

.lang-switch button {
  background: none;
  border: 1px solid #555;
  color: #fff;
  padding: 5px 10px;
  margin: 5px;
  cursor: pointer;
}

.lang-switch button.active {
  border-color: #f5c518;
  color: #f5c518;
}

/* TABS */
.tabs {
  display: flex;
  overflow-x: auto;
  background: #111;
  border-bottom: 1px solid #333;
}

.tab {
  padding: 15px 20px;
  cursor: pointer;
  white-space: nowrap;
  color: #aaa;
}

.tab.active {
  color: #f5c518;
  border-bottom: 2px solid #f5c518;
}

/* MENU */
.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.item {
  display: flex;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px dashed #333;
}

.price {
  color: #f5c518;
}

/* CTA */
.cta {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #f5c518;
  color: #000;
  padding: 15px 25px;
  font-weight: bold;
  border-radius: 50px;
  text-decoration: none;
}

/* HIDE */
.hidden {
  display: none;
}
</style>
</head>

<body>

<header>
  <h1>Vanatur Restaurant</h1>
  <div class="lang-switch">
    <button onclick="setLang('hy')" class="active">Հայերեն</button>
    <button onclick="setLang('en')">English</button>
  </div>
</header>

<div class="tabs" id="tabs"></div>

<div class="container" id="menu"></div>

<a href="tel:041551000" class="cta">📞 041 551000</a>

<script>

/* LANGUAGE */
let currentLang = 'hy';

function setLang(lang) {
  currentLang = lang;

  document.querySelectorAll('.lang-switch button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');

  renderTabs();
  renderMenu(Object.keys(menuData)[0]);
}

/* MENU DATA (YOU CAN EXTEND THIS CLEANLY) */
const menuData = {

  appetizers: {
    name: {hy: "Նախուտեստներ", en: "Appetizers"},
    items: [
      {hy: "Իկրա", en: "Caviar", price: "4500"},
      {hy: "Ձկան տեսականի", en: "Fish assortment", price: "10000"},
      {hy: "Հայկական պանիր", en: "Armenian cheese", price: "2300"},
      {hy: "Մսի տեսականի", en: "Meat assortment", price: "4800"},
      {hy: "Թարմ բանջարեղեն", en: "Fresh vegetables", price: "2500"},
      {hy: "Հաց", en: "Bread", price: "800"}
    ]
  },

  salads: {
    name: {hy: "Աղցաններ", en: "Salads"},
    items: [
      {hy: "Ամառային աղցան", en: "Summer salad", price: "2500"},
      {hy: "Հունական աղցան", en: "Greek salad", price: "3000"},
      {hy: "Կեսար (հավ)", en: "Caesar (chicken)", price: "3600"},
      {hy: "Կեսար (կրեվետկա)", en: "Caesar (shrimp)", price: "4500"},
      {hy: "Կապրեզե", en: "Caprese", price: "2200"}
    ]
  },

  soups: {
    name: {hy: "Ապուրներ", en: "Soups"},
    items: [
      {hy: "Սպաս", en: "Spas", price: "1200"},
      {hy: "Սոլյանկա", en: "Solyanka", price: "1800"},
      {hy: "Բորշ", en: "Borscht", price: "1700"},
      {hy: "Խարչո", en: "Kharcho", price: "1700"}
    ]
  },

  hot: {
    name: {hy: "Տաք ուտեստներ", en: "Hot Dishes"},
    items: [
      {hy: "Խոզի ռիբս", en: "Pork ribs", price: "5000"},
      {hy: "Տավարի քաբաբ", en: "Beef kebab", price: "1300"},
      {hy: "Հավի քաբաբ", en: "Chicken kebab", price: "1200"},
      {hy: "Քյուֆթա", en: "Kyufta", price: "7000"}
    ]
  },

  drinks: {
    name: {hy: "Խմիչքներ", en: "Drinks"},
    items: [
      {hy: "Ջուր", en: "Water", price: "300"},
      {hy: "Կոլա", en: "Cola", price: "300"},
      {hy: "Կոմպոտ", en: "Compote", price: "1500"},
      {hy: "Մոխիտո", en: "Mojito", price: "2000"}
    ]
  }

};

/* RENDER */
function renderTabs() {
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = '';

  Object.keys(menuData).forEach((key, i) => {
    const tab = document.createElement('div');
    tab.className = 'tab ' + (i === 0 ? 'active' : '');
    tab.innerText = menuData[key].name[currentLang];
    tab.onclick = () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      renderMenu(key);
    };
    tabs.appendChild(tab);
  });
}

function renderMenu(category) {
  const container = document.getElementById('menu');
  container.innerHTML = '';

  menuData[category].items.forEach(item => {
    const div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = `
      <span>${item[currentLang]}</span>
      <span class="price">${item.price}</span>
    `;
    container.appendChild(div);
  });
}

/* INIT */
renderTabs();
renderMenu('appetizers');

</script>

</body>
</html>
